body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿明教大師臣天息災奉詔譯第四幀像儀則品第七爾時妙吉祥童子即從坐起繞佛三匝頂禮佛足而白佛言善哉善哉如來應供正等正覺為利益世間一切衆生善能説此正法真言一切明義令諸有情依此道法方便修習成就一切菩薩真言行當得最上菩提涅槃今此真言甚深祕密拔濟世間利益廣大若佛滅後惡世之中一切聲聞緣覺菩薩聖賢普皆隱沒是時衆生懈怠放逸不信經法親近惡友虛妄姦詐邪見顛倒若聞此法驚怖疑惑此人命終入阿鼻獄流浪生死永不解脫唯願世尊慈悲憐愍方便解説真言相應幀像儀則令諸衆生降伏其心到無畏地爾時釋迦如來告妙吉祥童子言善哉善哉妙吉祥汝能為於末世衆生問於如來最上祕密真言行義成就幀像要妙儀則汝等諦聽當為汝説我有六字真言名微妙心是一切真言最上祕密大義藏汝等信受無復疑惑若彼衆生成就此法降伏其心決定成就佛果菩提過去七十六俱胝佛同所宣説我今為汝及末世衆生略而説之唵引嚩引𭇠切身替引惹藥唵引嚩引𭇠切身世引詵引娑嚩二合入唵引嚩引𭇠切身欠惹藥唵引嚩引𭇠切身儞瑟致二合引藥唵引嚩引𭇠切身捺摩諾唵引嚩引𭇠切身摩曩索爾時世尊説此真言已告妙吉祥言此六道六字微妙心真言具足大力大精進最上無等一切諸佛同所宣説最勝殊妙若此真言流布世間利樂衆生如佛住世而無有異又此法教有上中下今微妙心最上第一開菩提道入如來族成正覺乘得無上果若如來法教將欲滅時今此真言能為擁護令得久住若復有人依此軌儀志心持誦求於世間最上福德無不成就設復有人心未諦信於此壇儀試驗建置所求之事亦得成就何況志誠依法持誦爾時世尊説此幀像儀則真言法教為未來世五濁衆生短命貧窮懈怠癡愚不能精進修廣大行隨彼淺機而略説之先令修合白線或一兩或半兩以線織幀幀長一肘闊半肘下留少許線腳或以絹帛為幀亦得如要幀大或長二肘四肘六肘八肘至十肘亦得所有髮毛等並須去之潔淨護持無令黠污用白檀龍腦恭俱摩等香熏裛其幀然於淨潔之地安置一清淨器物以幀盛彼器中然後用白檀恭俱摩龍腦等香入無蟲淨水之內相和灑裛線幀依法安置三日作其擁護阿闍梨志心清淨於白月十五日向幀前面東坐吉祥草座誦此真言八千遍怛儞也二合他引唵引呬引呬引婆誐鑁嚩護嚕鉢馱囉尾儞也二合作芻詵引阿嚩路引迦野阿嚩路引迦野𤚥引三摩野摩努娑摩二合俱摩引囉嚕波馱哩尼摩賀引冒地薩怛嚩二合緊進囉引野細吽頗吒頗吒阿闍梨持此真言足已只於幀邊眠睡如夢中見好祥端幀法必成堪令畫像如所夢不祥幀法未成復於器中取出幀身而令陰乾其幀乾已別用圓滿潔淨之器盛幀在中於清淨之地祕密之處依法安置令持誦者復念六字微妙心真言一洛叉作其擁護彼幀決定成就滿三日後取出幀身就三長月令畫此幀若欲別月修建之時須就白月吉日復得吉星曜直日仍至夜半子時令彼畫人持受戒品至於天明就清淨之地燒龍腦香然令畫幀先畫聖妙吉祥童子作小童子相頭有五髻金色嚴身體著青衣復以青仙衣披挂身上於師子座上半跏趺坐右足踏於寶座寶座之下復有白蓮華作説法相上下端嚴諸相圓滿面戴喜怒之相觀視持誦之者右邊聖普賢坐白蓮華諸相具足一切莊嚴身紫緣色著於青衣真珠瓔珞以為絡腋左手執如意寶珠右手執白拂妙吉祥左邊畫聖觀自在亦坐白蓮身如中秋月色諸相具足一切莊嚴亦著青衣還以真珠瓔珞以為絡腋左手執白蓮華右手執金柄拂面戴喜相瞻仰於妙吉祥又此所坐白蓮從池水生於一莖幹有三枝蓮華中枝白蓮華坐妙吉祥兩邊白蓮華右坐普賢左坐觀自在其蓮華莖作大緑寶色於大無熱惱池出二大龍王一名難陀二名跋難陀身作白色一切莊嚴各於頭上戴七龍頭上半如人相下半如蛇形於此池中捧白蓮華莖舉頭瞻視妙吉祥菩薩其池之內無數蓮華或開未開而用莊嚴又於聖妙吉祥右邊近幀角畫持誦者如彼相儀畫之右膝著地手執香爐瞻仰道場會又於聖妙吉祥上近幀二角畫二天子乘雲空中往來飛行作雨花相雨下殊妙之花遍於幀上種種開敷如前儀則所有聖妙吉祥普賢觀自在及彼執持之物兼持誦阿闍梨並須依法周足畫之如不依法闕少一事壇法不成所求無就若人無力或可隨緣建置其法不定如所得造幀匹帛或一尺或一肘或半肘亦得為幀畫人或信法或不信法或持戒或不持戒或淨或不淨亦可得畫若彼持誦者或自或他須信重佛法持戒清淨發菩提心如是彼人於真言行必得成就若人於外道邪論及彼小乘而不樂著於此大乘信樂修習必得成於無上佛道若於白法而不信者於菩提種終無出生之用譬如焦穀永絶其芽若人信受依法持誦所有世間出世間一切真言及諸賢聖無不成就我今所説上中下品及彼小幀法則之事一切所求皆得成就第一成就最上法品第八爾時世尊釋迦牟尼佛告妙吉祥童子言我為衆生説此廣大殊勝幀像法則能令少善衆生成就廣大功德今欲為汝分別較量福德業報汝今諦聽善思念之爾時妙吉祥童子白佛言世尊善哉善哉今為我等分別較量真言法行所得功德唯願世尊慈悲憐愍方便解説爾時釋迦如來於其面門放大光明其光四色青黃赤白普照大衆復照三千大千世界一切魔王失大威力所有摩尼珠寶一切宿曜日月光明皆所映蔽而無照燭於是佛光却入面門爾時金剛手菩薩摩訶薩在大衆中即從坐起頭面禮足白佛言世尊以何因緣放大光明普照三千一切世界必有因緣願佛為説世尊告言金剛手如是如是如來現瑞必有所因今為汝等説此妙吉祥根本儀軌真言經王令彼有情所作所求皆得成就一切平等令入法行若有信敬受持讀誦書寫禮拜以龍腦香塗香及燒香花鬘繖蓋幢幡伎樂螺鈸妙音如是隨緣供養發回向心欲求大福或聞法教依法奉行或隨喜恭敬我與彼人皆受阿耨多羅三藐三菩提記如是放光而宣此事若有先入三昧淨持戒品受灌頂者於此儀軌王根本心真言外心真言或別真言及一字真言却曠野處以水果子及藥等根葉用充齋食潔淨身心隨意誦前真言三十洛叉復上山峯上面西安置前第四幀像阿闍梨面東坐吉祥草座用白檀恭俱摩香水浸白蓮華一洛叉向幀前獻釋迦牟尼佛及諸佛菩薩緣覺聲聞一切賢聖又以龍腦香諸雜名花隨緣供獻天龍神等於幀前作護摩爐如蓮華相就三長月十五日夜半子時用白檀為柴燒火復用恭俱摩龍腦和合作團數可八千用作護摩而為擁護時釋迦牟尼佛遍身出光猶如火聚即時阿闍梨以恭俱摩白檀水淹白蓮華獻閼伽水速繞幀三匝即頂禮一切諸佛菩薩聲聞緣覺既頂禮已即收幀受持不久之間速得神通經一彈指頃過梵天界到開花佛剎得見開花王如來及無數百千菩薩供養恭敬於妙吉祥前親得聽法住彼佛會壽命一劫所持幀像亦在彼處諸佛菩薩恆為護念諸佛法藏皆悉通達復得無量神通大力入千佛剎遍現千身與妙吉祥而為善知識此人決定成無上覺第二成就最上法品第九爾時一切大衆安詳而坐世尊釋迦牟尼佛於大衆中告彼天衆言汝等諦聽聖妙吉祥童子所行結壇真言成就法若有持誦之者能作擁護今最上祕密微妙心大明王真言一切佛説若誦此明如誦一切真言汝等天衆不得違犯此明王真言若依法持誦請召降伏假使聖妙吉祥尚不敢違何況別諸菩薩能破一切障難亦能破一切世間出世間真言今一字真言具大精進有大勢力唯一字真言於一切真言中最上無畏而得第一天衆問言今此真言云何名為一字復有何力世尊説言今此一字能具一切義能作一切事能斷一切呪能破一切罪業亦能圓滿一切真言於一切世間出世間真言中而為最上為一切如來心圓滿一切願更無能勝此真言者唵引瑟致陵三合此為聖者最上祕密能作一切事名為一字明王不得違犯能藏護衆生身令一切部多不能得見無能得便為一切佛之吉祥能成就一切真言能作一切世間師能作一切自在心能悲愍一切有情能破壞一切障難如意所作皆得成就一切真言先所未念亦得精熟而不忘失自著衣服誦此真言衣上加持見者愛敬加持齒木刷牙無患白迦囉尾囉木加持七遍若用刷齒所欲之者不求自得如有眼病用其鹽粖加持七遍然將點眼速得除差若患耳病用象糞內所生菌子及吉沒迦樹葉用慢火燒燒已去皮令溫和更入鹽粖都共合和一處加持七遍以藥點耳剎那中即差若女人難産生者而受痛苦用阿吒嚕沙迦藥根以無蟲淨水磨藥塗於臍上自然生下母子俱安若人傷刀箭惡瘡用陳酥加持八遍喫此酥兼塗瘡上彼瘡立差若患氣病及瀉痢青鹽或紅鹽或別鹽加持七遍然喫此鹽彼病立差若人患吐逆用麼覩籠誐藥根以無蟲淨水磨誦此真言加持或加持一遍二遍俱得除差又女人難産用阿濕嚩巘馱藥根以黃牛酥煎已復用黃牛乳同磨加持二十五遍女人月水後三日喫不得邪染夫自亦然若行邪染其藥無力若所生子於母腹內或一年二年三年五年或多年不生或被他人禁呪不生或藥法制伏不生或自有病不生或所患病進退不恆令不産生如是種種障礙生産不得以加持力皆得産生俱獲安樂若是冤家作法障礙難生用陳酥孔雀尾加持二十七遍合和同研細研已丸如訶子大復用白乳糖酥加持二遍然後同喫服食七日而得平善若患頭疼用烏翅加持七遍以翅拂患人頭速得安樂若男女孩子所患諸病用阿囕謨根儞梨迦根使乳汁同磨加持八百遍然後服食即得安樂若有患隔四日瘧病或三日二日恆日如是惡病用乳粥與酥同和加持八百遍與喫即得安樂若值捺吉儞鬼執者自口念八百遍觀視病人即得安樂若一切人所值惡鬼執者所謂摩多囉布單曩吠多拏童子鬼等加持自手八百遍以自手摩患人頂即得安樂若誦一遍自身得擁護若誦兩遍同行者得擁護若誦三遍一家得擁護誦四遍聚落得擁護若誦五遍一州得擁護如是若誦千遍一國得擁護如是皆能擁護及彼調伏一切能作若有忘失文句還得明記今此真言雖具調伏逼害之力佛不許作恐害情物又復建壇之法於彼無人淨處或近河岸海岸或恆河岸或別餘江河之岸所有清淨之處持誦者一日三時洗浴換衣默然乞食以菜果為食食已志心念真言三十洛叉如有祥瑞時即所求成就便於加持之處安置第一幀像排列供養或用金器或銀器或銅器或瓦器或磁器等陳列香花而用供養復令一洛叉人燃燈一洛叉用都嚕瑟二合香油盞內滿盛以白㲲布等為其燈心於彼像前普遍燃之照曜一切相次之間幀出光焰猶如火聚即時空中忽有鼓聲讚言善哉持誦阿闍梨若聞此聲速向幀前獻閼伽水旋繞三匝頂禮一切諸佛賢聖即收捧幀像而作受持不久之間及然燈之人得大神通於虛空中有一洛叉一天宮來迎此人復有諸天伎樂歌舞作唱天女讚歎復得持明輪王與彼持誦之者受於灌頂諸然燈者種種天衣而得嚴身遍體光明喻如日出住一大劫若阿闍梨為天輪王壽命延長得諸同行及諸天人以為侍者身體細妙下位難見於一切賢聖之中最上最尊天人愛敬於剎那中過於梵天持一切物供養諸佛及衆菩薩天帝之德亦不可及何況別諸天人與聖妙吉祥為善知識於未來世當得成佛復有成就之法先須於大曠野寂靜之地離諸喧鬧人物之類復有蓮華池池畔須有山於此山上所有妙吉祥儀軌經中一字真言及諸佛菩薩所説真言彼人隨意受持作法者食蓮華根為齋志心誦持真言三十六洛叉課誦畢已持執前儀軌所説第一幀安置山上用蓮華白檀恭俱摩香水浸佉禰囉木柴先安置蓮華三萬六千莖於爐內以所浸佉禰囉木同作護摩若護摩畢已世尊釋迦牟尼佛像於幀中放光照持誦者照已復入幀內令持誦者得五神通入菩薩地光淨如日隨意自在壽三十六劫復過三十六洛叉佛剎彼佛威力令得見三十六俱胝佛持彼教法於彼佛所而作供養與聖妙吉祥為善知識於未來世得無上菩提究竟涅槃
