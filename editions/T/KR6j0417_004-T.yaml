body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿明教大師臣天息災奉詔譯菩薩變化儀軌品第二之一爾時妙吉祥童子觀察會中一切大眾於是妙吉祥童子入觀照三摩地入此定已從其臍輪出大光明復有無數百千那由他俱胝光明以為眷屬普遍照耀一切眾生界及淨光天爾時金剛手菩薩摩訶薩告妙吉祥童子言汝今宣說曼拏羅法品儀軌令諸菩薩及一切眾生得入三昧復令一切眾生平等悟解真言句所有世間出世間一切真言行皆得成就金剛手祕密主如是說已爾時妙吉祥童子欲說最上祕密曼拏羅儀軌明照一切以神變力於其右手指端之上悉皆現起一切大眾復出無數百千那由他俱胝光明照彼淨光天上一切眾會爾時妙吉祥童子略說焰曼德迦忿怒明王心真言具大無畏一切所作請召發遣息除災害增長吉祥降伏諸魔隱沒身形行坐虛空或行地上足不履地令他愛敬等皆得成就破一切暗如廣大明燈此大無畏三字真言儀行法力最為第一所求所作一切真言義悉得成就即說大忿怒明王心真言唵引惡吽引此大忿怒明王心真言大菩薩妙吉祥善說曼拏羅真言行能作一切事破一切障礙爾時妙吉祥童子舉其右手摩忿怒明王頭稱如是言曩摩一切佛如是說已所有十方世界諸佛世尊無量菩薩具大福德三昧來住會中是時忿怒明王復現大忿怒相即往一切世界剎土之中所有惡心大力眾生尋遣來集淨光天上大眾之中依位安住又此眾生頂上各出熾盛光焰爾時妙吉祥童子觀彼大眾心淨瞻仰而復告言此諸大眾汝當諦聽我此三昧若不依行如有違犯令此忿怒明王現大威力而自調伏何為不得違犯緣此祕密三昧真言行義諸佛世尊菩薩大德平等法門汝今諦聽善思念之當為汝說曩謨三滿哆沒馱引喃引唵引囉囉三麼二合囉阿鉢囉二合底賀多舍引娑曩俱摩囉嚕波馱哩抳吽吽𠷑吒𠷑吒薩嚩二合引賀聖者此是我根本真言聖妙吉祥印名為五髻大印若用此印持誦根本真言一切所求皆得成就復說心真言作一切善事令心寂靜唵嚩枳也二合捺曩莫入說此印法名為三髻增長一切福德復說外心真言嚩枳也二合吽說此印法亦名三髻能降伏一切眾生復說內心微妙真言曩謨三滿哆沒馱喃曼說此印法名孔雀座敬愛一切眾生復有一切佛心大無畏八字真言名最上增益大吉祥斷三界生死消除一切惡趣能滅一切災害作一切事皆得安樂寂靜如現在見佛此妙吉祥菩薩宣布最上祕密真言相為一切眾生若有憶念一切所願皆得圓滿若有持誦之者所有五逆重罪皆得清淨即說真言曰唵阿尾囉吽佉左洛聖者有此八字大無畏最上祕密心真言與佛住世而無有異能作一切吉祥之事此大功德我今為汝略而宣說若欲廣陳經無數百千那由他俱胝劫校量功德說不能盡若說此印法名為大精進能圓滿一切願復說召請眾聖真言唵引呬引呬引俱摩囉尾濕嚩二合嚕閉尼薩哩嚩二合嚩引羅婆史哆鉢囉二合冒馱儞引阿野引呬婆誐挽曩引野呬俱摩囉吉哩二合拏怛婆二合羅馱哩尼曼拏羅末地野二合底瑟姹二合底瑟姹二合三摩野摩拏娑摩二合囉阿鉢囉二合底賀哆舍娑曩吽摩引尾羅嚩嚕嚕頗吒娑嚩二合賀此真言是妙吉祥菩薩召請一切諸佛一切菩薩一切辟支佛聲聞天龍夜叉乾闥婆阿修羅誐嚕拏緊那羅摩睺羅伽毘舍左羅剎娑一切部多等夫欲召請先以香水加持七遍灑淨一切廣闊四維上下一切諸佛菩薩妙吉祥并及眷屬一切世間出世間真言一切部多眾一切眾生皆赴道場曩謨三滿哆沒馱引喃引阿鉢囉二合底賀哆舍引娑曩喃引唵度度囉度囉度波嚩引悉儞度波引哩唧二合史吽底瑟姹二合三摩野摩努娑摩二合囉娑嚩二合引賀此是獻香真言若以白栴檀龍腦供俱摩香和合等燒此香時誦此真言一切如來及諸菩薩一切聖眾皆受供養前召請印名最上蓮華鬘能與一切眾生作大吉祥之事若於諸佛如來一切菩薩及聖眾等獻閼伽水所用龍腦白檀供俱摩等香復用惹帝華適意華摩梨迦華末哩師迦華龍華末俱羅華寶尼哆誐囉華如是等香華用淹水內此名獻閼伽水獻水真言曩謨三滿哆沒馱引喃引摩鉢囉二合底賀哆舍引娑曩引喃引怛儞也二合他引呬引呬引摩賀引迦引嚕尼迦尾濕嚩二合嚕波馱哩尼引阿哩凝伽二合鉢囉二合底蹉鉢囉二合底蹉波野三摩野摩努娑摩二合囉底瑟姹二合底瑟姹二合曼拏羅末地也二合鉢囉二合吠舍野薩哩嚩二合部哆引努波迦仡哩二合恨拏二合吽阿蘇囉尾左引哩尼娑嚩二合賀引此印名圓滿印能為一切眾生作圓滿事復說焚香真言若彼獻香如前真言曩謨三滿哆沒馱引喃引曩謨三滿哆巘馱引嚩娑引娑室哩二合夜引野怛他引誐哆引野怛儞也二合巘第巘第引巘第引巘馱引巘馱摩拏囉弭引鉢囉二合底蹉鉢囉二合底砌引難巘淡三滿哆引努左引哩尼引娑嚩二合賀引此印名波羅嚩圓滿一切願復說獻華真言曩謨三滿哆沒馱引喃引摩鉢囉二合底賀哆舍引娑曩喃引曩謨三俱蘇弭哆囉引惹寫怛他引誐哆寫怛儞也二合他引俱蘇弭引俱蘇摩引儞曳二合俱蘇摩布囉嚩引悉儞俱蘇摩引嚩底娑嚩二合賀引夫欲獻食先頂禮一切諸佛賢聖生不思議未曾有想今此真言正覺正說前後所有供獻皆依此儀念此真言曩謨三滿哆沒馱引喃引摩鉢囉二合底賀哆舍娑曩引喃引怛儞也二合他引呬引呬引婆誐嚩摩賀薩哩嚩二合沒馱引嚩路引吉哆摩引尾楞嚩伊難嚩隷誐哩二合恨拏二合引播野誐哩二合恨拏二合誐哩二合吽薩哩嚩二合尾濕嚩二合囉囉吒吒薩頗二合吒娑嚩二合引賀引今此真言印名為大力消除一切諸惡燃燈真言曩謨三滿哆沒馱引喃引摩鉢囉二合底賀哆舍引娑曩引喃引薩哩嚩二合怛夢引馱迦引囉尾特鑁二合悉喃引曩謨三滿哆祖底巘馱引嚩婆引娑室哩二合夜引野怛他引誐哆引野怛儞也二合他引呬引呬引婆誐鑁祖底囉舍弭二合設哆娑賀娑囉二合鉢囉二合底曼尼哆舍哩囉尾俱哩嚩二合摩賀引冒地薩怛嚩二合三滿哆入嚩二合囉引儞喻二合底哆沒哩底二合具哩那二合具哩那二合阿嚩路引迦野阿嚩路迦野曼拏羅薩哩嚩二合薩怛嚩二合難左此是燃燈真言印名曰廣開觀照一切眾生曩謨三滿哆沒馱引喃引摩鉢囉二合底賀哆舍引娑曩引喃引怛儞也二合他引入嚩二合入嚩二合羅入嚩二合羅入嚩二合羅野入嚩二合羅野吽尾冒馱迦賀哩訖哩二合瑟拏二合賓誐羅此是燃火真言印名合掌光照一切眾生過去諸佛菩薩所說爾時妙吉祥童子告祕密主金剛手菩薩言此微妙祕密真言汝等明王族部外現忿怒內含慈忍所有智者求一切真言皆得成就若彼金剛蓮華族等障礙之時即說此明令彼降伏曩謨薩哩嚩二合沒馱引喃引摩鉢囉二合底賀哆舍引娑曩引喃引怛儞也二合他引唵迦囉迦囉俱嚕俱嚕摩摩引迦引哩焰二合伴惹伴惹薩哩嚩二合尾近難二合引那賀那賀薩哩嚩二合嚩日羅二合尾那野劍引布哩嚩二合吒迦𡁠尾旦哆迦囉摩賀引尾訖哩二合哆嚕波馱哩尼鉢左鉢左薩哩嚩二合努瑟吒二合摩賀引誐拏鉢底𡁠尾旦哆迦囉滿馱滿馱薩哩嚩二合誐囉二合賀沙目佉沙部惹沙左囉拏嚕捺囉二合摩引曩野尾瑟拏二合摩引曩野沒囉二合憾摩二合儞也二合禰嚩引曩曩野摩引尾楞嚩尾楞嚩羅護羅護曼拏羅末他也二合鉢囉二合吠舍野三摩野摩努娑摩二合囉吽吽吽吽吽吽頗吒頗吒說此真言已告祕密主言此是大精進最上祕密名六面大忿怒明王能破障礙若持誦此明得自在十地菩薩猶可降伏何況諸惡障礙若有持誦供養大作擁護說此印法名為大叉破滅一切障礙復說忿怒明王心真言唵引仡哩二合瑟致哩二合哆引曩曩吽薩哩嚩二合設怛嚕二合曩舍野薩旦二合婆野頗吒頗吒若有一切冤家逼害惱亂之時依法念此真言令彼冤家受隔四日瘧病得大苦惱若人恒常誦持無慈悲心所求之事不得成就若人不信三寶誦此呪法令彼生信定得成就印名大叉與呪同用其驗剋成復說外心真言唵仡哩二合迦羅嚕波吽欠印名大叉若此明同用能調伏一切惡者復說內心真言名為一字一切佛說印名大叉與明同用能消除一切惡事降伏一切部多於曼拏羅中呪法成就之時定見忿怒明王靈驗復說發遣賢聖等真言曩謨薩哩嚩沒馱引喃引摩鉢囉二合底賀哆舍娑曩引喃引怛儞也二合他引惹焰惹野蘇惹野摩賀迦引嚕尼迦尾室左二合嚕閉尼引誐蹉誐蹉娑嚩二合婆嚩喃引薩哩嚩二合沒淡引室左二合尾娑哩惹二合野薩波哩嚩引囉引娑嚩二合婆嚩喃左怛囉二合鉢囉二合吠引舍野滿怛囉二合娑摩二合囉薩哩嚩二合室左二合弭悉殿覩滿怛囉二合播那引摩努囉淡左弭波哩布囉野此發遣真言印名寶座亦名獻座若欲發遣賢聖等專心志意念一七遍依法加持所有一切世間出世間曼拏羅真言行皆得三昧成就諸聖眾等歡喜而退爾時妙吉祥童子復觀淨光天內一切大眾說自己明王真言曩謨薩哩嚩二合沒馱引喃引摩鉢囉二合底賀哆誐底喃引唵儞哩致妙吉祥說此真言已化為明王名枳世儞能作一切之事印名大五髻若用此印法一切難作之事皆得成就曩謨三滿哆沒馱引喃引摩鉢囉二合底賀哆舍娑曩引喃引唵引儞致此真言名塢波枳世儞印名廣開一切之事所求皆成若有一切凶惡宿耀自然退散曩謨三滿哆沒馱引喃引摩鉢囉二合底賀哆誐底喃引唵引儞入此真言名曩隷儞印名寶座能成一切之事所有夜叉之眾亦能遣來曩謨三滿哆沒馱引喃引摩進部哆嚕閉𧹞引唵引稍罩嚕二合此真言名波隷儞印名大力能調伏一切拏枳儞鬼妙吉祥所說一切諸佛同說曩謨三滿哆沒馱引喃引摩鉢囉二合底賀哆誐底鉢囉二合左引哩𧹞引怛儞也二合他引唵引嚩囉禰引此明名增長化相印名三髻持誦同用速得富貴曩謨三滿哆沒馱引喃引摩進底也二合引部哆嚕閉拏引唵引部哩印名叉同用消除一切瘧病曩謨三滿哆沒馱引喃引摩進底也二合引部哆嚕閉𧹞引唵引怛囉二合引哩此明名哆囉印名大力能成一切事復能滅除障礙曩謨三滿哆沒馱引喃引摩進底也二合引部哆嚕閉𧹞引怛儞也二合他引唵尾路枳儞此明名大世印名嚩訖怛囉降伏一切世間皆得快樂曩謨三滿哆沒馱引喃引摩進底也二合部哆嚕閉𧹞引怛儞也二合他引唵尾濕吠二合引尾濕嚩二合三婆吠引尾濕嚩二合嚕閉尼迦賀迦賀阿尾舍引尾舍三摩野摩努此明名大精進印名能瑟吒囉亦名變化能令一切眾生起大施願惠施一切有情曩謨三滿哆沒馱引喃引摩進底也二合引部哆嚕閉𧹞引怛儞也二合他引唵引濕吠二合諦引室哩二合嚩布入此明名為大化印名孔雀座具不思議未曾有相作一切所欲之事無不成就能降伏世間童男童女生愛敬心曩謨三滿哆沒馱引喃引摩進底也二合引部哆嚕閉𧹞引怛儞也二合他唵引契契哩婆虞哩薩哩嚩二合設怛嚕二合薩旦二合婆野咎婆野謨引賀野嚩舍摩引曩藥此明名相應大明印名嚩訖怛囉能調伏造惡眾生曩謨三滿哆沒馱引喃引摩鉢底二合賀哆誐底鉢囉二合左引哩拏引怛儞也二合他引唵引室哩二合入此明名大福德印名合掌佛自宣說能令有情得國王位曩謨三滿哆沒馱引喃引薩哩嚩二合薩怛嚩二合婆野鉢囉二合捺引曳喃引怛儞也二合他唵引阿𡁠諦俱摩引哩嚕閉尼𪾼呬阿引誐蹉摩摩迦引哩焰二合俱嚕入此名無