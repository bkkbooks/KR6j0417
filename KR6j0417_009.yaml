body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿明教大師臣天息災奉詔譯第三成就最上法品第十爾時世尊釋迦牟尼佛復説此儀軌王最上成就法若彼誦者作法之時乘船入大恆河住河中間以乳為食誦真言三十洛叉別諸真言誦之皆得若誦數足見一切龍即作護摩爐如蓮華相用前第一幀面西安置獻大供養持誦者面東坐吉祥草座以白檀恭俱摩香熏裛龍花復用佉禰囉木為柴入在爐中每一龍花加持七遍而作護摩如是護摩數滿三萬作護摩時如有龍現或持香藥或持寶物而與持誦者不得受之若護摩畢已得持明輪王速具神通一切龍王皆悉降伏如同侍從隨意自在無有能勝之者壽命三十中劫親見聖妙吉祥尋以摩頂具五神通不久當來得成佛果復有成就最上法亦於大恆河中作法先用吉祥果木一段為其舟船牢固造作復用吉祥果木為於篙棹所用船工心須巧妙多有方便運彼舟船往來安穩恆在中流持誦者所有受持根本真言或六字真言三字真言一字真言及明王眷屬真言為成就法於船中面西安幀持誦者面東持於齋戒以乳果子藥苗藥根等為食一日三時洗浴三時換衣默然志心於彼幀前誦前真言六十洛叉持誦畢已船自往於大海所用之物隨行受持入大海時不得怕怖唯持誦者一人可得回船餘者皆否須臾之間可行百千由旬然就海中作成就法先作護摩爐如甕用佉禰囉木為柴用白檀龍腦龍花合和為團以瓦器內盛或大或小臨時俱得團數須滿六十洛叉加持作護摩亦然於護摩時有楞伽國住者羅叉變醜惡形復有龍宮名大富貴彼有大龍王從龍宮出變種種身現善惡相與彼羅剎發如是言汝起汝起為我作主如是復有阿修羅夜叉天人摩護羅伽及一切聖者發善軟言勸請令起不得便起亦不得驚怖持誦者即誦真言左手結祈克印祈克彼等即生怕怖尋便退散護摩作畢龍鬼既無持誦者并所有船剎那中間往色究竟天及諸剎土往來自在發菩提心見聖妙吉祥獲得五通大力所有一切龍一切羅叉一切夜叉一切阿修羅一切天人一切衆生皆悉降伏受誦者敕復得一切諸佛菩薩聖賢慈心護念所有摩多鬼及一切鬼神不見其身何況能為惱亂復有成就最上法用吉祥果木一段於恆河灘製作舟船復令一百二十人執燈身著白衣作於擁護然將第一幀如前儀則安置獻大供養復用龍花白檀恭俱摩龍腦合和為團數作三萬以佉禰囉木為柴用作護摩作護摩畢已人及舟船剎那中間往彼梵世隨意自在復見聖妙吉祥得菩薩地具大五通住壽一劫作大持明輪王彼執燈者得持明天同為侍從常供諸佛於未來世當成正覺復有成就最上法或於河岸海岸及大海中離於喧鬧寂靜之處起壇持誦求最上法皆得成就或雪山香山香醉山阿沒禰山三峯山及有花果樹林之處如佛所説應是山川林野深淨之處離諸雜穢衆惡之類欣樂誦持真言法行皆得成就若南印度或於吉祥山吉祥舍利塔等亦得成就法若北印度迦濕彌羅國儞波羅國迦尾尸國以次小支那國大支那國所有山林河海清淨之處皆得成就真言行法若於聚落城邑而作法者須是國王重臣信敬佛法人民士庶孝養父母恭敬賢聖無諸外道邪見衆生如是國土於寂靜處或於舍下或於露地皆可起壇求成就法若於中天大印度內所有殑伽河岸焰母曩河岸信度河岸捺哩摩二合那河岸嚩訖史二合河岸贊捺囉二合娑誐河岸淨岸迦嚩哩河岸娑囉莎底河岸枲多大河岸如是勝地可得成就最上法復有勝地金剛座大塔中轉法輪處安瑞像塔中及迦毗羅城摩耶夫人生太子處鷲峯山中華氏大城俱尸那城末度囉城曲女城塢濟儞城廣嚴城如是國土聚落皆是福德吉祥勝地所作所求皆得成就若有天人住處或尸陀林或有一堂一殿安尊像處或有華果大樹下或山頂高顯處或優樓頻螺大池上或摩嚕波國滿城中及儞奔拏河恆河入處海門邊鉢囉野誐大尸陀林及佛寺塔廟一切世間殊勝之地俱獲成就最上祕密法所有邊陲之地野外無諸花果樹木之地不得作法所有惡人集聚不律儀處暫住即得久住持誦結壇作法終不成就若佛菩薩緣覺聲聞一切聖賢經行之處最為殊勝其阿闍梨先須於真言儀軌法則道業並須精熟復須持戒清淨離諸貪欲智慧通達利益衆生然可依法持明結壇誦呪作於護摩所求滅罪其罪皆除所求吉祥一切成就如起首作法先面西安置幀像持誦者面東座用蟻子所運之土恆河岸上土復用白檀恭俱摩龍腦等香合和為泥於彼幀前作一孔雀於淨地生者長吉祥草於彼幀前作如車輪形令持誦者右手執其輪左手執孔雀於白月十五日夜幀前作大供養燒龍腦香至天明日出時彼泥孔雀變成大孔雀王輪亦出光持誦者現作天身身有光明如日初出著最上衣莊嚴於身即時頂禮諸佛菩薩旋繞幀像已即自收幀經須臾之間乘彼孔雀過於梵天有無數百千那由他俱胝天人為其眷屬自作天輪王壽命六十中劫隨意自在富貴具足無能勝者親見聖妙吉祥為善知識此人不久當得成佛復有成就法如是所樂拄杖淨瓶齒刷絡腋雄黃眼藥刀劍弓箭鉞斧種種器仗等或二足四足駝騾象馬師子龍虎等或飛禽之類孔雀白鶴鸞鳳等禽用白蟻所運之土或河岸土及諸妙香合和為泥如前器仗生類隨意所樂以泥作之或坐具臥具傘蓋頭冠一切莊嚴之具亦隨意作之或是僧家所用之物數珠革屣衣鉢錫杖剪刀針匙等物若是錫杖刀斧等並用上好鑌鐵作之其餘之物用前香泥修製修製既成復用五淨之水洗過然用閼伽水灑淨或一字真言或別真言誦八百遍以為結淨自作擁護以次如前所説於清淨祕密之處面西安置第一幀像持誦者面東坐於彼像前獻大供養燒龍腦香等於十五日夜執持所造物像志心誦前根本真言至於天明日出之時幀出大光所有前香泥象馬及彼鸞鳳乘之即可騰空自在若刀劍器仗乃至數珠革屣等執之亦然身如日出放大光明作天輪王為一切天主壽一大劫有無數百千那由他俱胝天人為其眷屬居最上摩尼寶殿前所乘象馬等類恆自隨身具大勢力自己真言常得成就他所呪法亦能破之於自誦者作大擁護令彼阿闍梨有大勢力具大精進成廣大身得聖妙吉祥讚言善哉以手摩頂為善知識乃至當得坐菩提道場成就佛身得一切衆生尊重供養令諸有情到真實際獲不退位是故我今略説最上成就法行於最上寂靜之地建置最上第一幀像作大最上殊勝供養行大最上真言事業所以持誦者乘空自在得天輪王大菩薩位具五神通往千佛剎於聖妙吉祥前成就一切智智復能布大法雲降甘露法雨普潤世間利樂有情以最上成就法力而能現作諸佛菩薩緣覺聲聞一切賢聖如是殊勝一切所欲吉祥之事皆得成就第四淨行觀想護摩成就法品第十一之一爾時世尊釋迦牟尼佛觀察淨光天中大會之衆根機成熟純善相應告妙吉祥童子言我為汝等欲説中品幀像儀則之事有中品事業中品成就法善哉汝等諦聽善思念之爾時妙吉祥童子白佛言世尊如來為一切世間天人師利樂有情救拔群品唯願世尊悲愍我等及末世衆生今所有法略為宣説世尊告妙吉祥汝今諦聽若有持誦阿闍梨若能修諸梵行持戒清淨身心柔軟悲愍有情若安居處於此一切真言成就法作其觀想持誦護摩決定不虛皆得成就如儀軌王所説若曼拏羅阿闍梨攝受弟子令入曼拏羅與彼灌頂所受弟子依法進修恆入三昧身心平等智慧明達所言誠諦離諸妄念勇猛不退恭敬孝順不老不少於諸利養而無愛著於自戒行亦無缺犯悲愍有情一切平等如是之者於此真言密行先作精熟而後求法又此阿闍梨於妙吉祥曼拏羅真言密行深入無礙得大總持善能分別三密妙行於法界性無畏無著人相具足生貴族家勇猛精進善療衆病斷貪嗔癡有如是德是名曼拏羅阿闍梨與彼為師其行無等若彼弟子夫欲求法於妙吉祥童子儀軌三昧深懷愛樂發恭敬心五體投地誠心告白我今願樂求受灌頂唯願闍梨慈悲攝受阿闍梨觀彼弟子威儀梵行戒品身心得如前説者即時攝受依法軌儀試驗彼等與彼灌頂教授真言令入三昧學祕密印如斯堅固信樂不退即為解脫一切真言成就儀軌若非此人於此儀軌不得為説若彼弟子得阿闍梨歡喜隨自力緣如法供養時阿闍梨教授養育如同父子所業既就復令隨處建置道場所有儀軌如前所説揀好壇地無諸雜穢瓦礫骸骨清淨之處安置幀像召請賢聖以香花燈燭種種供養獻閼伽水獻座及發遣一日三時洗浴著新淨衣持誦等日日如是復次阿闍梨精進持戒審諦思惟微妙法界深厭世間遠離幻法於諸真言通達無二成就甚深最上法行自作擁護如佛所説此真言王若人依行必獲聖道又持誦者善能分別三世業報於微細罪生廣大怖所有世間呪法諸佛真言金剛部族蓮華部族如是法教不憚辛勤勇猛修習學令成就如得成就於寂靜處如理思惟志心持誦利益有情植衆德本有如是行德而可為師若有學者書寫受持真言法行作曼拏羅求受灌頂如得成就利益無盡復自隨其緣力供養於師以飲食衣服臥具湯藥香花燈果恭敬供養如供諸佛而無有異於四威儀無令缺犯保重於師如保己命所學成就長壽無病一切所願皆得滿足若彼弟子尊重事師得師歡喜所有過去現在諸佛世尊聲聞緣覺及諸菩薩一切天人皆生歡喜若師有德無德有梵行無梵行不得毀謗又師自道法如法解説無復吝惜令彼修學長養法眼使一切衆生歸依有處如是弟子依阿闍梨得入諸佛祕密法藏如是阿闍梨依彼弟子傳通聖法令下善種是故師資相應成就佛法不斷三寶相續若無弟子付受法教恆行慈愍貧苦衆生與彼宣説入聖法財大乘儀軌真言法教上中下品修行要道最上希有難得之法漸次誘引令得修習熏生智種而得通達最上法行依教奉行隨處還修曼拏羅法如前儀説揀擇勝地於恆河岸信度河岸或大海或大野或高山或近山或深山或樹下或林中或中國聚落如是殊勝清淨之處志誠持誦心離散亂隨緣乞食食已默然冥心密誦降魔息災無不成就若復為人所為之者亦須信重愛樂忍辱柔和諸根無缺人相具足一切法事次第教授令彼早起於大河中取彼河水濾過無蟲用自洗浴令身無垢復用粖香志意加持然用塗身即令入壇彼阿闍梨亦自洗浴於河岸坐復用淨土洗手二十一遍然後刷牙整頓衣服於其佛前頭面作禮以香花飲食種種供養種種讚歎重用香花獻閼伽水獻已禮敬復自白言某甲弟子無始流浪罪業無邊身口七支其過不一今對佛前志誠發露願罪消滅如是懺悔復從坐起於彼幀前坐吉祥草座手執數珠一心持誦所誦真言須是依師傳受文言決定即許持誦若非傳受若句義差錯及別真言不得持誦恐不成就又此壇法有上中下今唯説中品法事誦課儀軌真言梵韻皆作中品又所發音韻亦不得高亦不得低聲調和雅文句分明此為中等幀像亦然過去諸佛同所宣説又每誦真言勿令異人聽聞恐彼疑惑返成墜墮須於寂靜之處結界安居志心持誦若持誦時於夜第四分或半夜時趺坐持誦至早晨日出以次中午獻閼伽水發遣賢聖其事訖已宣揚義理解説法句以次讀誦經典讀十地經般若波羅蜜經等如是讀誦恭敬供養投地作禮復誦根本真言調伏諸根專心佛道即得成就最上之法復次阿闍梨若入聚落求化食時默然淨行密誦法句顧瞻道路無蟲之地而得行之所乞之舍人有道心正見重佛即得乞食若無道心邪見顛倒非因計因不得往彼恐生疑謗墜墮彼等又於聚落若見美妙色聲等境不得貪著妄生適悅如入軍陳勇猛無畏破彼強敵如遇冤家深懷嫌厭若見女人想觀不淨臭惡膿血蛆蟲爛壞如尸陀林種種枯骸深生厭離若彼愚盲生顛倒見若處執樂非淨計淨於彼女色耽著不捨業繩纏縛墮六趣中輪回往來無有窮盡生死相續苦惱不斷譬如有人執索鞦韆往復高低繩不離手業繩亦爾六趣升沈業不離身如輪給水如蟻循環而無窮盡佛説女人為苦根本由是諸苦相續而生是故行人宜心遠離若阿闍梨如為女人喻若得病無其增益所求不成上品中品乃至下品成就之法皆不成就為破戒罪諸佛菩薩而無護念一切真言都無勝力人天福報少分快樂亦不可有何況真言最上之法又若親近女人於未來世欲求菩提涅槃永不成就何以故女色壞人障聖道故譬如有人截多羅樹頭於其截處芽永不生智種亦然女刀截故善芽不發是故女人過失既深切要遠離若彼智者心不邪亂離妄清淨觀彼女色如空中花如水中月不貪不著無得無捨於曼拏羅成最上法是名曼拏羅阿闍梨清淨乞食之行
